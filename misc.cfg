[gcode_shell_command get_ip]
command: /usr/local/bin/report_ip.py
timeout: 4.
verbose: True
[gcode_macro _GET_IP]
gcode:
    RUN_SHELL_COMMAND CMD=get_ip

[gcode_shell_command _network_recovery_check]
command: sudo /usr/local/bin/network-recovery-check.sh
timeout: 6.
verbose: True
[gcode_macro _NETWORK_RECOVERY_CHECK]
gcode:
    RUN_SHELL_COMMAND CMD=_network_recovery_check



[gcode_shell_command network_recover]
command: sudo -n /home/pi/printer_data/config/klipper-network-recover
timeout: 30
verbose: True

[gcode_macro RECOVER_WIFI]
description: Restart Wi-Fi/network services
gcode:
    RESPOND TYPE=command MSG="Restarting Wi-Fi/network services..."
    RUN_SHELL_COMMAND CMD=network_recover
    RESPOND TYPE=command MSG="Network recovery command finished."

#[neopixel my_neopixel]
#pin: EBBCan:PD3
##   The pin connected to the neopixel. This parameter must be
##   provided.
#chain_count: 3
##   The number of Neopixel chips that are "daisy chained" to the
##   provided pin. The default is 1 (which indicates only a single
##   Neopixel is connected to the pin).
##color_order: GRB
##   Set the pixel order required by the LED hardware (using a string
##   containing the letters R, G, B, W with W optional). Alternatively,
##   this may be a comma separated list of pixel orders - one for each
##   LED in the chain. The default is GRB.
#initial_RED: 0.5
#initial_GREEN: 0.7
#initial_BLUE: 0.1
#initial_WHITE: 1.0
##   See the "led" section for information on these parameters.

